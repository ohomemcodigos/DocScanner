name: docscanner
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.3.7
  open_filex: ^4.4.0
  intl: ^0.20.2
  local_auth: ^2.3.0
  google_mlkit_document_scanner: ^0.4.1
  provider: ^6.1.2
  permission_handler: ^12.0.3
  pdfx: ^2.5.0
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  share_plus: ^12.0.2
  pdf: ^3.11.1
  image_cropper: ^8.0.0
  image: ^4.1.7
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:

  uses-material-design: true
  assets:
    - assets/
  # assets (outros):
  #  - images/a_dot_burr.jpeg
  #  - images/a_dot_ham.jpeg
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  remove_alpha_ios: true

dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.22
